<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Ridgesun PureRing</title>
    <link rel="stylesheet" href="styles/industrial-design.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏭</text></svg>">
    <style>
        .error-container {
            min-height: 70vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        
        .error-code {
            font-size: 6rem;
            font-weight: 800;
            color: #2563eb;
            margin-bottom: 1rem;
        }
        
        .error-message {
            font-size: 1.5rem;
            color: #64748b;
            margin-bottom: 2rem;
            max-width: 600px;
        }
        
        .back-home {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background-color: #2563eb;
            color: white;
            text-decoration: none;
            border-radius: 0.5rem;
            font-weight: 600;
            transition: background-color 0.2s;
        }
        
        .back-home:hover {
            background-color: #1d4ed8;
        }
    </style>
</head>
<body class="industrial-bg">
    <div class="error-container">
        <div class="error-code">404</div>
        <h1 class="industrial-h1">Page Not Found</h1>
        <p class="error-message">
            The page you're looking for doesn't exist or has been moved. 
            Please check the URL or return to the homepage.
        </p>
        <a href="/" class="back-home">Return to Homepage</a>
        
        <div style="margin-top: 3rem; color: #94a3b8; font-size: 0.875rem;">
            <p>Ridgesun PureRing • Industrial Air Filtration Systems</p>
            <p>If you believe this is an error, please contact support.</p>
        </div>
    </div>
</body>
</html>
